<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
    <meta charset="utf-8"/>
    <!-- 모바일 전체 화면 및 노치 대응, 줌 방지 설정 -->
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    
    <!-- PWA 매니페스트 및 iOS 홈 화면 아이콘 연결 -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            screens: {
              'xs': '375px',
            },
            colors: {
              "surface-dim": "#131313",
              "primary": "#ffffff",
              "on-surface-variant": "#c4c7c8",
              "surface-container": "#1c1b1b",
              "surface-container-high": "#282727",
              "outline-variant": "#3a3a3a",
              "background": "#0a0a0a"
            },
            fontFamily: {
              "mono": ["Space Mono", "monospace"],
              "sans": ["Geist", "sans-serif"]
            }
          }
        }
      }
    </script>
    <style>
        /* 모바일 홈화면 위젯처럼 동작하도록 완전 고정 및 노치(safe-area) 영역 보호 */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow: hidden !important; /* 바디 스크롤 절대 방지 */
            height: 100vh;
            height: 100svh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            user-select: none;
            -webkit-user-select: none;
        }

        /* 1. 월별 3x4 격자 모드 (화면 늘어짐 방지를 위해 최대 높이를 칼같이 통제) */
        .months-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px; /* 미세 간격 축소로 집약도 상승 */
            width: 100%;
            height: 100%;
            max-height: calc(100vh - 125px) !important; /* 헤더 공간을 줄이고 달력 가용 공간 확보 */
            max-height: calc(100svh - 125px) !important;
            transition: max-height 0.3s ease;
            overflow: hidden !important;
        }

        /* 월별 카드 스타일 */
        .month-container {
            border-radius: 6px;
            padding: 8px 10px; /* 도트 크기 확대에 따라 내부 여백 고안 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        /* [윈도우 다크 테마 계산기 스타일] */
        .theme-win {
            background-color: #121212 !important; /* 조금 더 깊은 다크 모드로 변경 */
        }
        .theme-win .month-container {
            background-color: #1a1a1a;
            border: 1px solid #242424;
        }
        .theme-win .month-container:hover {
            border-color: #444444;
            background-color: #1a1a1a;
        }
        /* 활성 월 강조: 네온 블루 보더라인 및 은은한 글로우 */
        .theme-win .month-container.active-month {
            border: 1.5px solid #60cdff;
            background-color: transparent !important;
            box-shadow: 0 0 12px rgba(96, 205, 255, 0.25);
        }
        .theme-win .past-dot { 
            background-color: #ffffff !important; 
        }
        .theme-win .future-dot { 
            background-color: #2a2a2a !important; /* 미래 도트 명도 낮춤 */
        }
        .theme-win .pulse-active {
            animation: pulse-blue 2s infinite;
            background-color: #60cdff !important;
            z-index: 5;
        }
        .theme-win #theme-btn {
            border-color: #242424;
            background-color: #1a1a1a;
        }

        /* [애플 계산기 테마 스타일] */
        .theme-mac {
            background-color: #000000 !important;
        }
        .theme-mac .month-container {
            background-color: #101012;
            border: 1px solid #1c1c1e;
        }
        .theme-mac .month-container:hover {
            border-color: #3a3a3c;
            background-color: #101012;
        }
        /* 활성 월 강조: 오피셜 오렌지 보더라인 및 은은한 글로우 */
        .theme-mac .month-container.active-month {
            border: 1.5px solid #ff9f0a;
            background-color: transparent !important;
            box-shadow: 0 0 12px rgba(255, 159, 10, 0.25);
        }
        .theme-mac .past-dot { 
            background-color: #ffffff !important; 
        }
        .theme-mac .future-dot { 
            background-color: #202022 !important; /* 미래 도트 명도 낮춤 */
        }
        .theme-mac .pulse-active {
            animation: pulse-orange 2s infinite;
            background-color: #ff9f0a !important;
            z-index: 5;
        }
        .theme-mac #theme-btn {
            border-color: #1c1c1e;
            background-color: #101012;
        }

        /* 각 카드 상단 월 문자의 가독성 및 비율 조정 */
        .month-name {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: #888888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: left;
            margin-bottom: 3px;
            padding-left: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 6주 기준 고정 격자 */
        .dot-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 2.5px; /* 격자 간격 미세 조정 */
            align-items: center;
            justify-items: center;
            flex-grow: 1;
        }

        .dot {
            aspect-ratio: 1 / 1;
            width: 100%;
            border-radius: 50%;
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* 과도하게 커지던 도트의 최대 지름을 미니멀하게 통제 */
        .dot-grid .dot {
            max-width: 7px; 
        }

        .dot:not(.empty-dot):hover, .dot:not(.empty-dot).touch-hovering {
            transform: scale(1.3);
            z-index: 10;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            opacity: 1.0 !important;
        }

        .dot.dimmed {
            opacity: 0.2;
        }

        .empty-dot { 
            background-color: transparent; 
            cursor: default;
            pointer-events: none;
        }

        /* 오늘 날짜 하이라이트 애니메이션 */
        @keyframes pulse-blue {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(96, 205, 255, 0.6); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 4px rgba(96, 205, 255, 0); }
        }
        @keyframes pulse-orange {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 159, 10, 0.6); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 4px rgba(255, 159, 10, 0); }
        }
    </style>
</head>
<body class="font-sans antialiased select-none theme-win" id="body-root">
    <!-- 메인 레이아웃: 모바일 화면에 한눈에 안착하도록 컴팩트 패딩 설정 -->
    <main class="flex-1 flex flex-col items-center justify-between px-4 xs:px-5 py-2 md:py-3 overflow-hidden max-w-2xl mx-auto w-full h-full">
        
        <!-- 상단 컨트롤 헤더 영역 (시각적 위계감을 대폭 개선한 최종 그리드) -->
        <header id="standard-header" class="w-full text-center flex flex-col items-center justify-center py-0 shrink-0">
            <div class="bg-transparent border-none rounded-xl px-1 py-1 w-full h-[75px] flex items-center justify-between gap-2 transition-all duration-300" id="dashboard-card">
                
                <!-- 좌측 정돈 영역: 시점 명시(Pre-Header)와 굵고 깨끗한 기준 날짜 배치 -->
                <div class="flex flex-col items-start justify-center min-w-0 flex-1">
                    <!-- 서브타이틀: 소형 캡션 형태의 위계 확보 -->
                    <p class="font-mono text-[9px] font-bold tracking-widest uppercase text-neutral-500 min-h-[13px] transition-colors text-left" id="dashboard-subtitle">TODAY</p>
                    <div class="flex items-center justify-start mt-0.5 w-full shrink-0">
                        <span class="font-sans text-2xl xs:text-3xl font-black text-white select-none transition-all duration-200 tracking-tight" id="year-label">2026.05.24.</span>
                    </div>
                </div>

                <!-- 우측 제어 영역: 기능형 스위치 및 프리미엄 알약형 진행률 배지 배치 -->
                <div class="flex flex-col items-end justify-center gap-1.5 shrink-0 select-none">
                    <!-- 테마 스위치: 간결한 마감 형태의 둥근 라인 칩 -->
                    <button id="theme-btn" onclick="toggleTheme()" class="flex items-center justify-center gap-1 px-2 py-0.5 border rounded-full active:scale-95 transition-all text-neutral-400 hover:text-white" title="테마 변경">
                        <span class="inline-block w-1.5 h-1.5 rounded-full shrink-0" id="theme-btn-dot"></span>
                        <span class="font-mono text-[8px] font-bold tracking-wider select-none leading-none" id="theme-btn-text">BLUE</span>
                    </button>

                    <!-- % 진행률 알약형 배지 (수치와 진행 모드를 정교한 세로선으로 완벽 가이드) -->
                    <div onclick="toggleProgressMode()" class="flex items-center gap-2 bg-neutral-900/80 border border-neutral-800/80 px-2.5 py-1.5 rounded-full cursor-pointer hover:bg-neutral-800/50 active:scale-98 transition-all select-none h-[28px]" id="metric-box" title="클릭하여 남은 비율 보기">
                        <span class="font-sans text-xs xs:text-sm font-extrabold text-white transition-colors tracking-tight leading-none" id="progress-percent">00%</span>
                        <span class="w-[1px] h-2.5 bg-neutral-800 transition-colors" id="progress-divider"></span> <!-- 세로 구분선 -->
                        <span class="font-mono text-[8px] text-neutral-400 font-bold uppercase transition-colors tracking-wider leading-none shrink-0" id="progress-suffix">Passed</span>
                    </div>
                </div>
                
            </div>
        </header>

        <!-- 컴팩트한 연간 달력 그리드 영역 -->
        <section class="w-full flex-1 overflow-hidden py-0.5" id="main-view-section">
            <!-- 자바스크립트로 달력이 동적 렌더링 됨 -->
        </section>

    </main>

    <script>
        const bodyRoot = document.getElementById('body-root');
        const mainViewSection = document.getElementById('main-view-section');
        const progressPercent = document.getElementById('progress-percent');
        const progressSuffix = document.getElementById('progress-suffix');
        const yearLabel = document.getElementById('year-label');
        const dashboardSubtitle = document.getElementById('dashboard-subtitle');
        const dashboardCard = document.getElementById('dashboard-card');
        const metricBox = document.getElementById('metric-box');
        const progressDivider = document.getElementById('progress-divider');
        const themeBtnDot = document.getElementById('theme-btn-dot');
        const themeBtnText = document.getElementById('theme-btn-text');
        const themeBtn = document.getElementById('theme-btn');

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        const actualToday = new Date();
        const actualYear = actualToday.getFullYear();
        const displayedYear = actualYear;

        let displayProgressMode = 'passed';
        let defaultPercentageText = "00";
        let defaultYearText = "2026.05.24.";
        let defaultSubtitleText = "TODAY"; // 기본 서브타이틀 TODAY로 고정
        let defaultSuffixText = "Passed";
        let currentTheme = 'win';

        let restoreTimer = null;
        let activeFocusedDot = null;
        let activeFocusedDotData = null;

        function formatDateToString(date) {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}.${mm}.${dd}.`;
        }

        function getThemeTextClass() {
            return (currentTheme === 'mac') ? 'text-[#ff9f0a]' : 'text-[#60cdff]';
        }

        function setTheme(themeName) {
            currentTheme = themeName;
            bodyRoot.classList.remove('theme-win', 'theme-mac');
            
            if (themeName === 'mac') {
                bodyRoot.classList.add('theme-mac');
                themeBtnDot.className = "inline-block w-1.5 h-1.5 rounded-full bg-[#ff9f0a] shrink-0";
                themeBtnText.textContent = "ORANGE";
                themeBtn.className = "flex items-center justify-center gap-1 px-2 py-0.5 border border-[#1c1c1e] bg-[#101012] hover:bg-[#1c1c1e] rounded-full active:scale-95 transition-all text-neutral-400 hover:text-white";
            } else {
                bodyRoot.classList.add('theme-win');
                themeBtnDot.className = "inline-block w-1.5 h-1.5 rounded-full bg-[#60cdff] shrink-0";
                themeBtnText.textContent = "BLUE";
                themeBtn.className = "flex items-center justify-center gap-1 px-2 py-0.5 border border-[#242424] bg-[#1a1a1a] hover:bg-[#242424] rounded-full active:scale-95 transition-all text-neutral-400 hover:text-white";
            }
            updateDashboard();
        }

        function toggleTheme() {
            setTheme(currentTheme === 'win' ? 'mac' : 'win');
        }

        function detectOSAndApplyTheme() {
            const platform = navigator.platform || '';
            const userAgent = navigator.userAgent || '';
            const isApple = /Mac|iPhone|iPad|iPod/.test(platform) || /Mac|iPhone|iPad|iPod/.test(userAgent);
            setTheme(isApple ? 'mac' : 'win');
        }

        function formatPercent(value) {
            const num = parseFloat(value);
            return (num === 100 || num === 0) ? num.toString() : num.toFixed(1);
        }

        // 도트 임시 집중 모드 시 호버 대상 이외 도트 불투명도 조절
        function dimOtherDots(targetElement) {
            const allDots = mainViewSection.querySelectorAll('.dot:not(.empty-dot)');
            allDots.forEach(dot => { if (dot !== targetElement) dot.classList.add('dimmed'); });
        }

        function undimAllDots() {
            const allDots = mainViewSection.querySelectorAll('.dot:not(.empty-dot)');
            allDots.forEach(dot => {
                dot.classList.remove('dimmed');
                dot.classList.remove('touch-hovering');
            });
        }

        // [도트 터치 시 시각적 위계 피드백 연동 설계]
        function triggerTemporaryFocus(targetDot, dateStr, dayIndex, percent) {
            if (restoreTimer) clearTimeout(restoreTimer);
            if (activeFocusedDot) activeFocusedDot.classList.remove('touch-hovering');

            activeFocusedDot = targetDot;
            targetDot.classList.add('touch-hovering');
            activeFocusedDotData = { targetDot, dateStr, dayIndex, percent };
            
            dimOtherDots(targetDot);

            const numericPercent = parseFloat(percent);
            let displayPercent = (displayProgressMode === 'remaining') ? 100 - numericPercent : numericPercent;
            let focusSuffix = (displayProgressMode === 'remaining') ? "Remaining" : "Passed";

            // 좌측 서브타이틀을 현재 날짜 정보에 맞춰 세련되게 전환
            dashboardSubtitle.textContent = `DAY OF YEAR: ${dayIndex}`;
            const focusTextColorClass = getThemeTextClass();
            dashboardSubtitle.className = `font-mono text-[9px] font-bold tracking-widest uppercase truncate min-h-[13px] transition-colors text-left ${focusTextColorClass}`;
            
            // 날짜 및 퍼센트 정보 동기화
            yearLabel.textContent = dateStr;
            progressPercent.textContent = `${formatPercent(displayPercent)}%`;
            progressPercent.className = `font-sans text-xs xs:text-sm font-extrabold tracking-tight transition-colors ${focusTextColorClass} leading-none`;
            
            progressSuffix.textContent = focusSuffix;
            progressSuffix.className = `font-mono text-[8px] font-bold uppercase transition-colors tracking-wider shrink-0 ${focusTextColorClass} leading-none`;

            // 우측 알약 배지 테두리 및 배경을 테마 색상으로 발광 피드백 연동
            const pillBorderColor = (currentTheme === 'mac') ? 'border-[#ff9f0a]/60' : 'border-[#60cdff]/60';
            const pillBgColor = (currentTheme === 'mac') ? 'bg-[#ff9f0a]/10' : 'bg-[#60cdff]/10';
            const dividerBgColor = (currentTheme === 'mac') ? 'bg-[#ff9f0a]/30' : 'bg-[#60cdff]/30';

            metricBox.className = `flex items-center gap-2 border px-2.5 py-1.5 rounded-full cursor-pointer transition-all select-none h-[28px] ${pillBorderColor} ${pillBgColor}`;
            progressDivider.className = `w-[1px] h-2.5 transition-colors ${dividerBgColor}`;

            restoreTimer = setTimeout(restoreDefaultDisplay, 2000);
        }

        // 원래 대시보드 상태로 원복
        function restoreDefaultDisplay() {
            undimAllDots();
            if (activeFocusedDot) {
                activeFocusedDot.classList.remove('touch-hovering');
                activeFocusedDot = null;
            }
            activeFocusedDotData = null;

            // 좌측 타이포그래피 복원
            dashboardSubtitle.textContent = defaultSubtitleText;
            dashboardSubtitle.className = "font-mono text-[9px] text-neutral-500 font-bold tracking-widest uppercase truncate min-h-[13px] transition-colors text-left";

            yearLabel.textContent = defaultYearText;
            
            // 우측 알약 배지 복원
            progressPercent.textContent = `${defaultPercentageText}%`;
            progressPercent.className = "font-sans text-xs xs:text-sm font-extrabold tracking-tight text-white transition-colors leading-none";
            
            progressSuffix.textContent = defaultSuffixText;
            progressSuffix.className = "font-mono text-[8px] text-neutral-400 font-bold uppercase transition-colors tracking-wider shrink-0 leading-none";

            metricBox.className = "flex items-center gap-2 bg-neutral-900/80 border border-neutral-800/80 px-2.5 py-1.5 rounded-full cursor-pointer hover:bg-neutral-800/50 active:scale-98 transition-all select-none h-[28px]";
            progressDivider.className = "w-[1px] h-2.5 bg-neutral-800 transition-colors";
        }

        function toggleProgressMode() {
            displayProgressMode = (displayProgressMode === 'passed') ? 'remaining' : 'passed';
            if (activeFocusedDotData) {
                const { targetDot, dateStr, dayIndex, percent } = activeFocusedDotData;
                triggerTemporaryFocus(targetDot, dateStr, dayIndex, percent);
            } else {
                updateDashboard();
            }
        }

        // 날짜 레이블 또는 알약 배지를 누르면 유연하게 Passed <-> Remaining 간의 전환 가동
        yearLabel.addEventListener('click', toggleProgressMode);

        function updateDashboard() {
            const isLeap = (displayedYear % 4 === 0 && displayedYear % 100 !== 0) || (displayedYear % 400 === 0);
            const totalDays = isLeap ? 366 : 365;

            defaultYearText = formatDateToString(actualToday);

            const startOfYear = new Date(actualYear, 0, 1);
            const diff = actualToday - startOfYear;
            const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
            const basePassedPercentage = (dayOfYear / totalDays) * 100;
            defaultSubtitleText = "TODAY";

            if (displayProgressMode === 'passed') {
                defaultPercentageText = formatPercent(basePassedPercentage);
                defaultSuffixText = "Passed";
            } else {
                defaultPercentageText = formatPercent(100 - basePassedPercentage);
                defaultSuffixText = "Remaining";
            }

            yearLabel.textContent = defaultYearText;
            progressPercent.textContent = `${defaultPercentageText}%`;
            progressSuffix.textContent = defaultSuffixText;
            dashboardSubtitle.textContent = defaultSubtitleText;

            if (restoreTimer) clearTimeout(restoreTimer);
            activeFocusedDot = null;
            activeFocusedDotData = null;

            renderCalendarView();
        }

        function renderCalendarView() {
            mainViewSection.innerHTML = '<div class="months-grid" id="months-container"></div>';
            const monthsContainer = document.getElementById('months-container');

            const isLeap = (displayedYear % 4 === 0 && displayedYear % 100 !== 0) || (displayedYear % 400 === 0);
            const totalDays = isLeap ? 366 : 365;
            const startOfYear = new Date(displayedYear, 0, 1);
            const activeMonthIndex = actualToday.getMonth();
            const highlightTextColorClass = getThemeTextClass();

            for (let m = 0; m < 12; m++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = (m === activeMonthIndex) ? 'month-container active-month' : 'month-container';
                
                const headerDiv = document.createElement('div');
                headerDiv.classList.add('month-name');

                let currentMonthTitle = monthNames[m];
                if (m === activeMonthIndex) {
                    currentMonthTitle = `${monthNames[m]} ${displayedYear}`;
                    headerDiv.classList.add(highlightTextColorClass);
                }

                headerDiv.innerHTML = `<span>${currentMonthTitle}</span>`;
                monthDiv.appendChild(headerDiv);

                const grid = document.createElement('div');
                grid.classList.add('dot-grid');

                const firstDayOfMonth = new Date(displayedYear, m, 1).getDay();
                const daysInMonth = new Date(displayedYear, m + 1, 0).getDate();

                for (let e = 0; e < firstDayOfMonth; e++) {
                    const empty = document.createElement('div');
                    empty.className = "dot empty-dot";
                    grid.appendChild(empty);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    const currentDate = new Date(displayedYear, m, d);
                    const formattedDate = `${displayedYear}.${String(m + 1).padStart(2, '0')}.${String(d).padStart(2, '0')}.`;
                    
                    const currentDiff = currentDate - startOfYear;
                    const curDayIndex = Math.floor(currentDiff / (1000 * 60 * 60 * 24)) + 1;
                    const curPercent = (curDayIndex / totalDays) * 100;

                    if (currentDate.toDateString() === actualToday.toDateString()) {
                        dot.classList.add('pulse-active');
                    } else if (currentDate < actualToday) {
                        dot.classList.add('past-dot');
                    } else {
                        dot.classList.add('future-dot');
                    }

                    const runTrigger = (e) => {
                        e.preventDefault();
                        triggerTemporaryFocus(dot, formattedDate, curDayIndex, curPercent);
                    };

                    dot.addEventListener('click', runTrigger);
                    dot.addEventListener('touchstart', runTrigger, {passive: false});

                    grid.appendChild(dot);
                }

                const filledCells = firstDayOfMonth + daysInMonth;
                const trailingCells = 42 - filledCells;
                for (let t = 0; t < trailingCells; t++) {
                    const empty = document.createElement('div');
                    empty.className = "dot empty-dot";
                    grid.appendChild(empty);
                }
                
                monthDiv.appendChild(grid);
                monthsContainer.appendChild(monthDiv);
            }
        }

        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
            });
        }

        detectOSAndApplyTheme();
    </script>
</body>
</html>
